# cronwatch configuration schema (reference)
#
# Top-level keys
# --------------
# jobs        – list of monitored cron jobs (required)
# smtp        – SMTP alerting configuration (optional)
# webhooks    – list of HTTP webhook endpoints (optional)

jobs:
  - name: string            # unique job identifier (required)
    schedule: string        # cron expression, e.g. "0 3 * * *" (required)
    max_duration: integer   # seconds; alert if runtime exceeds this (optional)
    drift_threshold: integer # seconds; alert if start drifts beyond this (optional)
    contact: string         # email address for per-job overrides (optional)

smtp:
  host: string              # SMTP server hostname
  port: integer             # default 587
  username: string
  password: string
  from_addr: string
  to_addrs:                 # list of recipient addresses
    - string
  use_tls: boolean          # default true

webhooks:
  - url: string             # HTTP(S) endpoint (required)
    method: string          # default POST
    slack_format: boolean   # wrap in Slack {"text":...} envelope; default false
    timeout: integer        # seconds; default 10
    headers:                # optional extra HTTP headers
      string: string
